<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DeepKi{% endblock %} — Xiao Qi's Scanner</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
    <link rel="stylesheet" href="/static/css/deepki.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-ws@2.0.0/ws.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <!-- ── Navbar ── -->
    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-brand">
                <span class="brand-icon">🔍</span>
                <span class="brand-text">DeepKi</span>
                <span class="brand-emoji">(●°u°●)​ 」</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
                    🏠 Dashboard
                </a>
                <a href="/targets/" class="nav-link {% if request.url.path.startswith('/targets') %}active{% endif %}">
                    🎯 Targets
                </a>
                <a href="/scans/new" class="nav-link {% if request.url.path.startswith('/scans') %}active{% endif %}">
                    ▶️ Scan
                </a>
                <a href="/results/" class="nav-link {% if request.url.path.startswith('/results') %}active{% endif %}">
                    📊 Results
                </a>
            </div>
            <div class="nav-status" id="sys-status">
                <span class="status-dot online"></span>
                ^ - ^ idle
            </div>
        </div>
    </nav>

    <!-- ── Toast Container ── -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ── Main Content ── -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- ── Footer ── -->
    <footer class="footer">
        <div class="footer-inner">
            <span>♪───Ｏ（≧∇≦）Ｏ────♪</span>
            <span>Generated by Xiao Qi</span>
            <span>DeepKi v1.0 (●°u°●)​ 」</span>
        </div>
    </footer>

    <!-- ── Global JS ── -->
    <script>
    // Auto-dismiss toasts
    document.addEventListener('htmx:afterSettle', function(evt) {
        const toasts = document.querySelectorAll('.toast');
        toasts.forEach(t => {
            setTimeout(() => {
                t.classList.add('toast-fade');
                setTimeout(() => t.remove(), 500);
            }, 3000);
        });
    });

    // System status updater
    setInterval(async () => {
        try {
            const resp = await fetch('/api/stats');
            const data = await resp.json();
            document.getElementById('sys-status').innerHTML =
                `<span class="status-dot online"></span> ^ - ^ ${data.targets || 0} targets`;
        } catch(e) {}
    }, 30000);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
