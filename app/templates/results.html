{% extends "base.html" %}
{% block title %}Results — DeepKi{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1>📊 Results</h1>
        <p class="text-muted">View scan results and generate reports~ ~_^</p>
    </div>

    <!-- Scan List -->
    <div class="section">
        <h2 class="section-title">🕐 Recent Scans</h2>
        <div id="scan-list" hx-get="/scans/list" hx-trigger="load" hx-swap="innerHTML">
            <div class="loading-placeholder">>_< Loading...</div>
        </div>
    </div>

    <!-- Scan Detail -->
    <div id="scan-detail" class="section"></div>
</div>

<style>
.page-container { max-width: 1000px; margin: 0 auto; }
.page-header { margin-bottom: 2rem; }
</style>
{% endblock %}
